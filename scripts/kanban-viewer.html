<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Viewer</title>
  <style>
    /*
     * ══ CSS AUDIT (task-2.apply-fixes.audit-css) ══
     *
     * 1. DUPLICATE RULES
     *    - L110+L121: .drop-zone declared twice; cursor:pointer should merge into first block
     *
     * 2. MISSING THEME TOKENS / HARDCODED COLORS
     *    - .drop-zone.dragover: rgba(33,150,243,0.05) hardcoded, doesn't track --status-running in light theme
     *    - .shortcuts-help: box-shadow rgba(0,0,0,0.2) not theme-aware
     *    - .status-done/.status-running/.status-failed: color:#fff hardcoded (minor)
     *    - No --shadow-color token for box-shadows
     *
     * 3. CROSS-FEATURE CLASS CONFLICTS
     *    - .tree-node.filter-hidden (display:none) vs .node-children.collapsed (display:none):
     *      applyFilter() auto-expands ancestors (removes .collapsed, adds .expanded chevron)
     *      but clearing filter does NOT restore original collapse state → progressive unwanted expansion
     *    - Repeated filter/clear cycles expand all branches permanently
     *
     * 4. SPECIFICITY / DEAD RULES
     *    - @media .node-header font-size:0.8rem is dead: child .node-id/.node-desc have explicit 0.85rem
     *    - .progress-segment.done vs .status-done naming overlap (different elements, confusing)
     *
     * 5. MINOR
     *    - body padding:0 redundant with * { padding:0 } reset
     *    - Universal * reset strips semantic element defaults (safe for now, fragile if HTML changes)
     */
    :root,
    [data-theme="dark"] {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #0f3460;
      --bg-card-hover: #1a4a80;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --border-color: #2a2a4a;
      --status-done: #4caf50;
      --status-running: #2196f3;
      --status-pending: #9e9e9e;
      --status-failed: #f44336;
      --error-bg: #3e1a1a;
      --error-border: #f44336;
      --error-text: #ff8a80;
      --summary-bg: #16213e;
      --pending-text: #1a1a2e;
    }

    [data-theme="light"] {
      --bg-primary: #f0f2f5;
      --bg-secondary: #e4e8ec;
      --bg-card: #ffffff;
      --bg-card-hover: #eef1f5;
      --text-primary: #1a1a2e;
      --text-secondary: #5a5a7a;
      --border-color: #d0d4da;
      --status-done: #2e7d32;
      --status-running: #1565c0;
      --status-pending: #757575;
      --status-failed: #c62828;
      --error-bg: #fdecea;
      --error-border: #c62828;
      --error-text: #c62828;
      --summary-bg: #e4e8ec;
      --pending-text: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
    }

    /* Summary header bar */
    .summary-bar {
      display: flex;
      gap: 1.5rem;
      padding: 1rem 1.5rem;
      background: var(--summary-bg);
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
      align-items: center;
    }

    .summary-bar h1 {
      font-size: 1.2rem;
      margin-right: auto;
    }

    .summary-item {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .summary-item .value {
      font-weight: bold;
      color: var(--text-primary);
      margin-left: 0.3rem;
    }

    .goal-bar {
      padding: 0.6rem 1.5rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .goal-bar strong { color: var(--text-primary); }

    /* Error display */
    .error-banner {
      display: none;
      margin: 1rem 1.5rem;
      padding: 0.8rem 1rem;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 6px;
      color: var(--error-text);
      font-size: 0.9rem;
      white-space: pre-wrap;
    }

    .error-banner.visible { display: block; }

    /* Drop zone */
    .drop-zone {
      margin: 1rem 1.5rem;
      padding: 2rem;
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone { cursor: pointer; }

    .drop-zone.dragover {
      border-color: var(--status-running);
      background: rgba(33, 150, 243, 0.05);
    }

    /* Progress bar */
    .progress-bar-container {
      width: 100%;
      padding: 0 1.5rem 0.5rem;
      background: var(--summary-bg);
      border-bottom: 1px solid var(--border-color);
    }

    .progress-bar {
      display: flex;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      background: var(--bg-card);
    }

    .progress-segment {
      height: 100%;
      transition: width 0.3s ease;
    }

    .progress-segment.done    { background: var(--status-done); }
    .progress-segment.running { background: var(--status-running); }
    .progress-segment.pending { background: var(--status-pending); }
    .progress-segment.failed  { background: var(--status-failed); }

    /* Tree container */
    .tree-container {
      padding: 1rem 1.5rem;
    }

    /* Tree node styles */
    .tree-node {
      margin: 0.3rem 0;
    }

    .node-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.7rem;
      background: var(--bg-card);
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
      flex-wrap: wrap;
    }

    .node-header:hover {
      background: var(--bg-card-hover);
    }

    .chevron {
      width: 1rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-secondary);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .chevron.expanded { transform: rotate(90deg); }
    .chevron.leaf { visibility: hidden; }

    .node-id {
      font-weight: bold;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .node-desc {
      flex: 1;
      font-size: 0.85rem;
      color: var(--text-secondary);
      min-width: 100px;
    }

    .status-badge {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      font-weight: bold;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .status-done    { background: var(--status-done);    color: #fff; }
    .status-running { background: var(--status-running); color: #fff; }
    .status-pending { background: var(--status-pending); color: var(--pending-text); }
    .status-failed  { background: var(--status-failed);  color: #fff; }

    .node-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .node-children {
      margin-left: 1.5rem;
      border-left: 1px solid var(--border-color);
      padding-left: 0.5rem;
    }

    .node-children.collapsed { display: none; }

    /* Auto-refresh indicator */
    .refresh-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .refresh-controls label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .refresh-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--status-pending);
    }

    .refresh-dot.active { background: var(--status-done); }

    /* Theme toggle */
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s;
    }

    .theme-toggle:hover {
      background: var(--bg-card-hover);
    }

    /* Tree controls */
    .tree-controls {
      display: none;
      gap: 0.5rem;
      padding: 0.5rem 1.5rem 0;
    }

    .tree-controls.visible { display: flex; }

    .tree-controls button {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s;
    }

    .tree-controls button:hover {
      background: var(--bg-card-hover);
    }

    .filter-input {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      flex: 1;
      min-width: 150px;
      max-width: 300px;
      outline: none;
      transition: border-color 0.15s;
    }

    .filter-input:focus {
      border-color: var(--status-running);
    }

    .filter-input::placeholder {
      color: var(--text-secondary);
    }

    .tree-node.filter-hidden {
      display: none;
    }

    .tree-node.filter-match > .node-header {
      box-shadow: inset 3px 0 0 var(--status-running);
    }

    /* Keyboard shortcuts help tooltip */
    .shortcuts-help {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.6;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .shortcuts-help .title {
      font-weight: bold;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
    }

    .shortcuts-help kbd {
      display: inline-block;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 3px;
      padding: 0 0.3rem;
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text-primary);
      margin-right: 0.3rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .summary-bar { flex-direction: column; gap: 0.5rem; }
      .node-header { font-size: 0.8rem; }
      .node-children { margin-left: 0.8rem; }
    }
  </style>
</head>
<body>

  <div class="summary-bar">
    <h1>Kanban Viewer</h1>
    <div class="summary-item">Total: <span class="value" id="total">-</span></div>
    <div class="summary-item">Done: <span class="value" id="done" style="color:var(--status-done)">-</span></div>
    <div class="summary-item">Running: <span class="value" id="running" style="color:var(--status-running)">-</span></div>
    <div class="summary-item">Pending: <span class="value" id="pending" style="color:var(--status-pending)">-</span></div>
    <div class="summary-item">Failed: <span class="value" id="failed" style="color:var(--status-failed)">-</span></div>
    <div class="summary-item">Cost: $<span class="value" id="cost">-</span></div>
    <div class="refresh-controls">
      <span class="refresh-dot" id="refresh-dot"></span>
      <label><input type="checkbox" id="auto-refresh" checked> Auto-refresh</label>
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme">Dark</button>
  </div>

  <div class="progress-bar-container" id="progress-bar-container" style="display:none">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="goal-bar" id="goal-bar" style="display:none">
    <strong>Goal:</strong> <span id="goal-text"></span>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="drop-zone" id="drop-zone" title="Click to browse or drag a kanban.json file here">
    Drop a <strong>kanban.json</strong> file here or <strong>click to browse</strong>, or it will auto-load from <code>.claude-flow/kanban.json</code>
    <input type="file" id="file-input" accept=".json,application/json" style="display:none">
  </div>

  <div class="tree-controls" id="tree-controls">
    <input type="text" class="filter-input" id="filter-input" placeholder="Filter by id or description...">
    <button id="expand-all">Expand All</button>
    <button id="collapse-all">Collapse All</button>
  </div>

  <div class="tree-container" id="tree-container"></div>

  <div class="shortcuts-help" id="shortcuts-help">
    <div class="title">Keyboard Shortcuts</div>
    <div><kbd>R</kbd> Refresh</div>
    <div><kbd>E</kbd> Expand all</div>
    <div><kbd>C</kbd> Collapse all</div>
    <div><kbd>F</kbd> Focus filter</div>
    <div><kbd>T</kbd> Toggle theme</div>
    <div><kbd>Esc</kbd> Blur filter</div>
  </div>

  <script>
    // ── State ──
    let kanbanData = null;
    let autoRefreshTimer = null;
    const AUTO_REFRESH_INTERVAL = 3000;

    // ── Error display ──
    function showError(msg) {
      const banner = document.getElementById('error-banner');
      banner.textContent = msg;
      banner.classList.add('visible');
    }

    function clearError() {
      const banner = document.getElementById('error-banner');
      banner.textContent = '';
      banner.classList.remove('visible');
    }

    // ── JSON validation ──
    function validateKanban(data) {
      if (typeof data !== 'object' || data === null) {
        throw new Error('Invalid kanban data: expected a JSON object');
      }
      if (!data.summary || typeof data.summary !== 'object') {
        throw new Error('Invalid kanban data: missing or invalid "summary" field');
      }
      if (!Array.isArray(data.tree)) {
        throw new Error('Invalid kanban data: missing or invalid "tree" field (expected array)');
      }
      return data;
    }

    // ── Load from fetch (auto-refresh path) ──
    async function loadKanban() {
      try {
        const resp = await fetch('.claude-flow/kanban.json', { cache: 'no-store' });
        if (!resp.ok) {
          throw new Error('Failed to fetch kanban.json: ' + resp.status + ' ' + resp.statusText);
        }
        const text = await resp.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (parseErr) {
          throw new Error('Malformed JSON in kanban.json: ' + parseErr.message);
        }
        validateKanban(data);
        clearError();
        kanbanData = data;
        render(kanbanData);
      } catch (err) {
        showError(err.message);
      }
    }

    // ── Load from File (drag-and-drop / FileReader path) ──
    function loadKanbanFromFile(file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          let data;
          try {
            data = JSON.parse(e.target.result);
          } catch (parseErr) {
            throw new Error('Malformed JSON in dropped file: ' + parseErr.message);
          }
          validateKanban(data);
          clearError();
          kanbanData = data;
          render(kanbanData);
        } catch (err) {
          showError(err.message);
        }
      };
      reader.onerror = function () {
        showError('Failed to read the dropped file');
      };
      reader.readAsText(file);
    }

    // ── Summary rendering ──
    function renderSummary(summary) {
      document.getElementById('total').textContent = summary.total ?? '-';
      document.getElementById('done').textContent = summary.done ?? '-';
      document.getElementById('running').textContent = summary.running ?? '-';
      document.getElementById('pending').textContent = summary.pending ?? '-';
      document.getElementById('failed').textContent = summary.failed ?? '-';
      document.getElementById('cost').textContent =
        typeof summary.total_cost_usd === 'number'
          ? summary.total_cost_usd.toFixed(4)
          : '-';

      // Progress bar
      var total = summary.total || 0;
      var bar = document.getElementById('progress-bar');
      var barContainer = document.getElementById('progress-bar-container');
      bar.innerHTML = '';
      if (total > 0) {
        barContainer.style.display = '';
        var statuses = ['done', 'running', 'pending', 'failed'];
        statuses.forEach(function (s) {
          var count = summary[s] || 0;
          if (count > 0) {
            var seg = document.createElement('div');
            seg.className = 'progress-segment ' + s;
            seg.style.width = ((count / total) * 100).toFixed(2) + '%';
            seg.title = s + ': ' + count + ' (' + ((count / total) * 100).toFixed(1) + '%)';
            bar.appendChild(seg);
          }
        });
      } else {
        barContainer.style.display = 'none';
      }
    }

    // ── Tree rendering ──
    function createNodeEl(node) {
      const div = document.createElement('div');
      div.className = 'tree-node';

      const hasChildren = Array.isArray(node.children) && node.children.length > 0;

      // Header
      const header = document.createElement('div');
      header.className = 'node-header';

      const chevron = document.createElement('span');
      chevron.className = 'chevron' + (hasChildren ? ' expanded' : ' leaf');
      chevron.textContent = '▶';
      header.appendChild(chevron);

      const idSpan = document.createElement('span');
      idSpan.className = 'node-id';
      idSpan.textContent = node.id || '?';
      header.appendChild(idSpan);

      const descSpan = document.createElement('span');
      descSpan.className = 'node-desc';
      descSpan.textContent = node.description || '';
      header.appendChild(descSpan);

      const badge = document.createElement('span');
      const status = (node.status || 'pending').toLowerCase();
      badge.className = 'status-badge status-' + status;
      badge.textContent = status;
      header.appendChild(badge);

      // Cost field (always visible)
      const costSpan = document.createElement('span');
      costSpan.className = 'node-meta';
      costSpan.textContent = typeof node.cost_usd === 'number'
        ? '$' + node.cost_usd.toFixed(4)
        : '$-';
      header.appendChild(costSpan);

      // Commit field (always visible)
      const commitSpan = document.createElement('span');
      commitSpan.className = 'node-meta';
      commitSpan.textContent = node.commit_hash
        ? node.commit_hash.substring(0, 7)
        : 'no-commit';
      header.appendChild(commitSpan);

      div.appendChild(header);

      // Children
      if (hasChildren) {
        const childrenDiv = document.createElement('div');
        childrenDiv.className = 'node-children';
        node.children.forEach(function (child) {
          childrenDiv.appendChild(createNodeEl(child));
        });
        div.appendChild(childrenDiv);

        // Collapse/expand
        header.addEventListener('click', function () {
          const isCollapsed = childrenDiv.classList.toggle('collapsed');
          chevron.classList.toggle('expanded', !isCollapsed);
        });
      }

      return div;
    }

    function renderTree(tree) {
      const container = document.getElementById('tree-container');
      container.innerHTML = '';
      tree.forEach(function (node) {
        container.appendChild(createNodeEl(node));
      });
    }

    // ── Expand / Collapse all ──
    function setAllExpanded(expanded) {
      const container = document.getElementById('tree-container');
      container.querySelectorAll('.node-children').forEach(function (el) {
        el.classList.toggle('collapsed', !expanded);
      });
      container.querySelectorAll('.chevron:not(.leaf)').forEach(function (el) {
        el.classList.toggle('expanded', expanded);
      });
    }

    document.getElementById('expand-all').addEventListener('click', function () {
      setAllExpanded(true);
    });

    document.getElementById('collapse-all').addEventListener('click', function () {
      setAllExpanded(false);
    });

    // ── Main render ──
    function render(data) {
      // Hide drop zone and show tree controls once data loads
      document.getElementById('drop-zone').style.display = 'none';
      document.getElementById('tree-controls').classList.add('visible');

      // Goal
      if (data.goal) {
        document.getElementById('goal-bar').style.display = '';
        document.getElementById('goal-text').textContent = data.goal;
      } else {
        document.getElementById('goal-bar').style.display = 'none';
      }
      renderSummary(data.summary);
      renderTree(data.tree);

      // Re-apply active filter after re-render
      var filterVal = document.getElementById('filter-input').value.trim();
      if (filterVal) applyFilter(filterVal);
    }

    // ── Drag and drop ──
    const dropZone = document.getElementById('drop-zone');

    dropZone.addEventListener('dragover', function (e) {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', function () {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', function (e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) {
        // Stop auto-refresh when user drops a file
        stopAutoRefresh();
        document.getElementById('auto-refresh').checked = false;
        loadKanbanFromFile(file);
      }
    });

    // ── Click to browse ──
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', function () {
      fileInput.click();
    });

    fileInput.addEventListener('change', function () {
      const file = fileInput.files[0];
      if (file) {
        stopAutoRefresh();
        document.getElementById('auto-refresh').checked = false;
        loadKanbanFromFile(file);
      }
      // Reset so the same file can be re-selected
      fileInput.value = '';
    });

    // ── Auto-refresh ──
    function startAutoRefresh() {
      stopAutoRefresh();
      const dot = document.getElementById('refresh-dot');
      dot.classList.add('active');
      loadKanban();
      autoRefreshTimer = setInterval(loadKanban, AUTO_REFRESH_INTERVAL);
    }

    function stopAutoRefresh() {
      const dot = document.getElementById('refresh-dot');
      dot.classList.remove('active');
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    document.getElementById('auto-refresh').addEventListener('change', function () {
      if (this.checked) {
        startAutoRefresh();
      } else {
        stopAutoRefresh();
      }
    });

    // ── Theme toggle ──
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('theme-toggle');
      btn.textContent = theme === 'dark' ? 'Dark' : 'Light';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('kanban-theme', next);
    }

    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

    // ── Filter ──
    function applyFilter(query) {
      const container = document.getElementById('tree-container');
      const allNodes = container.querySelectorAll('.tree-node');

      if (!query) {
        // Clear all filter states
        allNodes.forEach(function (el) {
          el.classList.remove('filter-hidden', 'filter-match');
        });
        return;
      }

      const q = query.toLowerCase();

      // Recursively check if a .tree-node DOM element matches or has a descendant that matches
      function markNode(nodeEl) {
        const header = nodeEl.querySelector(':scope > .node-header');
        const idText = header.querySelector('.node-id').textContent.toLowerCase();
        const descText = header.querySelector('.node-desc').textContent.toLowerCase();
        const selfMatch = idText.includes(q) || descText.includes(q);

        // Check children
        const childrenContainer = nodeEl.querySelector(':scope > .node-children');
        let childMatch = false;
        if (childrenContainer) {
          const childNodes = childrenContainer.querySelectorAll(':scope > .tree-node');
          childNodes.forEach(function (child) {
            if (markNode(child)) childMatch = true;
          });
        }

        const visible = selfMatch || childMatch;
        nodeEl.classList.toggle('filter-hidden', !visible);
        nodeEl.classList.toggle('filter-match', selfMatch);

        // If a child matches, ensure this ancestor's children are expanded
        if (childMatch && childrenContainer) {
          childrenContainer.classList.remove('collapsed');
          const chevron = header.querySelector('.chevron');
          if (chevron) chevron.classList.add('expanded');
        }

        return visible;
      }

      // Process only top-level tree nodes
      const topNodes = container.querySelectorAll(':scope > .tree-node');
      topNodes.forEach(function (nodeEl) {
        markNode(nodeEl);
      });
    }

    document.getElementById('filter-input').addEventListener('input', function () {
      applyFilter(this.value.trim());
    });

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', function (e) {
      const key = e.key.toLowerCase();
      const tag = document.activeElement.tagName;
      const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

      // All shortcuts are suppressed when an input is focused
      if (isInput) {
        // Escape blurs the current input
        if (key === 'escape') {
          e.preventDefault();
          document.activeElement.blur();
        }
        return;
      }

      // F focuses the filter input (only when not already in an input)
      if (key === 'f' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        document.getElementById('filter-input').focus();
        return;
      }

      if (key === 'r' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        loadKanban();
      } else if (key === 'e' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        setAllExpanded(true);
      } else if (key === 'c' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        setAllExpanded(false);
      } else if (key === 't' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        toggleTheme();
      }
    });

    // ── Init ──
    // Restore theme preference (default: dark)
    applyTheme(localStorage.getItem('kanban-theme') || 'dark');
    startAutoRefresh();
  </script>
</body>
</html>
